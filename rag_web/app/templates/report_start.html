{% extends "base.html" %}

{% block title %}Start Report{% endblock %}

{% block content %}
<div class="page page--narrow stack">
    <div class="page-header">
        <div class="page-header__body">
            <h1 class="page-header__title">Start Report</h1>
            <p class="page-header__subtitle">Generate a new report outline using AI.</p>
        </div>
    </div>

    <div class="card">
        <div class="card__body">
            <form method="post" class="form django-form" data-loading-overlay data-loading-overlay-message="Generating the report outline. This can take a moment.">
                {% csrf_token %}
                {{ form.as_p }}

                <div class="form__actions">
                    <button type="submit" class="button button--primary">Generate Outline</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
