{% extends "base.html" %}

{% block title %}Review Topics{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-6">
        <h2 class="text-2xl font-semibold text-gray-900">Review Topics</h2>
        <p class="text-sm text-gray-600 mt-1">{{ section.title }} → {{ subsection.title }}</p>
    </div>

    <form method="post" class="space-y-6">
        {% csrf_token %}

        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
            <h3 class="text-lg font-medium text-gray-900 mb-4">Topics</h3>
            <ul id="topics" class="space-y-2">
                {% for topic in topics %}
                <li class="flex items-center gap-2">
                    <input type="text" name="topic_{{ forloop.counter0 }}" value="{{ topic.title }}" class="flex-1 px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" required />
                    <button type="button" onclick="removeItem(this)" class="text-red-600 hover:text-red-700 px-2">✖</button>
                </li>
                {% endfor %}
            </ul>

            <button type="button" onclick="addTopic()" class="mt-4 text-sm text-blue-600 hover:text-blue-700 font-medium">
                + Add Topic
            </button>
        </div>

        <div class="flex items-center gap-3">
            <button type="submit" name="action" value="save" class="inline-flex items-center px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                Save Changes
            </button>
            <button type="submit" name="action" value="approve" class="inline-flex items-center px-4 py-2 text-sm font-medium text-white bg-green-600 rounded-lg hover:bg-green-700 transition-colors">
                Approve Topics
            </button>
            <button type="submit" name="action" value="regenerate" class="inline-flex items-center px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                Regenerate
            </button>
        </div>
    </form>
</div>

<script>
function removeItem(button) {
  button.closest("li").remove();
}

function addTopic() {
  const ul = document.getElementById("topics");
  const index = ul.children.length;

  const li = document.createElement("li");
  li.className = "flex items-center gap-2";
  li.innerHTML = `
    <input type="text" name="topic_${index}" placeholder="Topic title" class="flex-1 px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" required />
    <button type="button" onclick="removeItem(this)" class="text-red-600 hover:text-red-700 px-2">✖</button>
  `;
  ul.appendChild(li);
}
</script>

{% endblock %}
