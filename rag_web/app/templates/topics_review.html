{% extends "base.html" %}

{% block title %}Review Topics{% endblock %}

{% block content %}
<div class="page page--reading stack">
    <div class="page-header">
        <div class="page-header__body">
            <h1 class="page-header__title">Review Topics</h1>
            <p class="page-header__subtitle">{{ section.title }} / {{ subsection.title }}</p>
        </div>
    </div>

    <form method="post" class="form">
        {% csrf_token %}

        <div class="card">
            <div class="card__body form__section">
                <div class="section__header">
                    <h2 class="section__title">Topics</h2>
                </div>
                <ul id="topics" class="editor-list">
                    {% for topic in topics %}
                    <li class="editor-row">
                        <input type="text" name="topic_{{ forloop.counter0 }}" value="{{ topic.title }}" required>
                        <button type="button" onclick="removeItem(this)" class="button button--danger editor-row__remove">Remove</button>
                    </li>
                    {% endfor %}
                </ul>

                <div class="page-actions">
                    <button type="button" onclick="addTopic()" class="button button--secondary">Add Topic</button>
                </div>
            </div>
        </div>

        <div class="form__actions">
            <button type="submit" name="action" value="save" class="button button--secondary">Save Changes</button>
            <button type="submit" name="action" value="approve" class="button button--primary">Approve Topics</button>
            <button type="submit" name="action" value="regenerate" class="button button--secondary" data-loading-overlay data-loading-overlay-message="Regenerating subsection topics. Please wait.">Regenerate</button>
        </div>
    </form>
</div>

<script>
function removeItem(button) {
  button.closest("li").remove();
}

function addTopic() {
  const ul = document.getElementById("topics");
  const index = ul.children.length;

  const li = document.createElement("li");
  li.className = "editor-row";
  li.innerHTML = `
    <input type="text" name="topic_${index}" placeholder="Topic title" required>
    <button type="button" onclick="removeItem(this)" class="button button--danger editor-row__remove">Remove</button>
  `;
  ul.appendChild(li);
}
</script>
{% endblock %}
