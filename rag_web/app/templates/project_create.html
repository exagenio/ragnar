<!DOCTYPE html>
<html>
<head>
    <title>Create Project</title>
</head>
<body>
    <h2>Create Project & Connect Database</h2>

    {% if messages %}
        <ul>
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Create Project</button>
    </form>
</body>
</html>
