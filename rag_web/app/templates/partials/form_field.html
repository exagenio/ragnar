<div class="form__field {% if full_width %}form__field--full{% endif %}">
    <label for="{{ field.id_for_label }}" class="form__label">
        {{ field.label }}
    </label>
    {{ field }}
    {% if field.help_text %}
        <p class="form__help">{{ field.help_text|safe }}</p>
    {% endif %}
    {% if field.errors %}
        <p class="form__error">{{ field.errors|join:", " }}</p>
    {% endif %}
</div>
