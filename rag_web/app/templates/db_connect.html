{% extends "base.html" %}

{% block title %}Connect Database{% endblock %}

{% block content %}
<div class="page page--narrow stack">
    <div class="page-header">
        <div class="page-header__body">
            <h1 class="page-header__title">Connect Database</h1>
            <p class="page-header__subtitle">Project: {{ project.name }}</p>
        </div>
    </div>

    <div class="card">
        <div class="card__body">
            <form method="post" class="form django-form">
                {% csrf_token %}
                {{ form.as_p }}

                <div class="form__actions">
                    <button type="submit" class="button button--primary">Test and Save Connection</button>
                    <a href="{% url 'project_detail' project.id %}" class="button button--secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
