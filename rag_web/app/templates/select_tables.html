{% extends "base.html" %}

{% block title %}Select Tables{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <h2 class="text-2xl font-semibold text-gray-900">Select Tables</h2>
        <p class="text-sm text-gray-600 mt-1">Project: <span class="font-medium text-gray-900">{{ project.name }}</span></p>
    </div>

    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {{ form.as_p }}

            <div class="pt-4">
                <button type="submit" class="inline-flex items-center px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors">
                    Save Selected Tables
                </button>
            </div>
        </form>
    </div>
</div>

<style>
    form p {
        margin-bottom: 1rem;
    }
    form label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: #374151;
        margin-bottom: 0.5rem;
    }
    form input[type="checkbox"] {
        width: 1rem;
        height: 1rem;
        margin-right: 0.5rem;
        border-radius: 0.25rem;
        border: 1px solid #d1d5db;
    }
    form input, form select, form textarea {
        padding: 0.5rem 0.75rem;
        font-size: 0.875rem;
        border: 1px solid #d1d5db;
        border-radius: 0.5rem;
        transition: border-color 0.15s ease-in-out;
    }
    form input:focus, form select:focus, form textarea:focus {
        outline: none;
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    form ul {
        list-style: none;
        padding: 0;
    }
    form ul li {
        padding: 0.5rem 0;
    }
</style>
{% endblock %}
