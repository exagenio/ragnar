<h2>Approved Topics</h2>

<h3>{{ subsection.title }}</h3>

<ul>
  {% for topic in topics %}
    <li>
      {{ topic.title }}
      —
      <a href="{% url 'topic_analysis_plan' project.id report.id topic.id %}">
        Open Analysis Plan
      </a>
    </li>
  {% empty %}
    <li>No approved topics yet.</li>
  {% endfor %}
</ul>

<a href="{% url 'subtopic_dashboard' project.id report.id %}">
  ← Back to Dashboard
</a>
