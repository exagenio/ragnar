<!DOCTYPE html>
<html>
<head>
    <title>Column Introspection</title>
</head>
<body>

<h2>Column Introspection</h2>
<p>Project: <strong>{{ project.name }}</strong></p>

{% for table in schema_info %}
    <h3>Table: {{ table.table_name }}</h3>

    <table border="1" cellpadding="5">
        <tr>
            <th>Column Name</th>
            <th>Data Type</th>
            <th>Nullable</th>
        </tr>

        {% for col in table.columns %}
        <tr>
            <td>{{ col.name }}</td>
            <td>{{ col.type }}</td>
            <td>{{ col.nullable }}</td>
        </tr>
        {% endfor %}
    </table>
{% endfor %}

<br>
<a href="{% url 'project_detail' project.id %}">
    Back to Project
</a>

</body>
</html>
