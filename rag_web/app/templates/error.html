{% extends "base.html" %}

{% block title %}Error{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow-sm border border-red-200 p-8">
        <div class="flex items-start">
            <div class="flex-shrink-0">
                <svg class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <div class="ml-3 flex-1">
                <h2 class="text-lg font-medium text-red-800">Action Not Allowed</h2>
                <p class="mt-2 text-sm text-gray-600">{{ message }}</p>
                <div class="mt-4">
                    <a href="javascript:history.back()" class="inline-flex items-center text-sm font-medium text-blue-600 hover:text-blue-700">
                        ← Go Back
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
