<h2>Topic Content Generation</h2>

<p>
  <strong>Topic:</strong> {{ topic.title }} <br />
  <strong>Status:</strong> {{ content.status }}
</p>

<hr />

{% if content.content_json %}
<pre style="background: #f5f5f5; padding: 15px">
{{ content.content_json|safe }}
  </pre
>
{% else %}
<p>No content generated yet.</p>
{% endif %}

<form method="post">
  {% csrf_token %}
  <button type="submit" name="action" value="generate">
    ▶ Generate Content
  </button>
</form>
<a href="{% url 'view_topics' project.id report.id topic.subsection_id %}">
  ← Back
</a>
